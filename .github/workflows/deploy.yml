name: Deploy Muse

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 159.89.228.0
          username: aaron
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/tickerpicker/tickerpicker
            git pull
            source venv/bin/activate
            pip install -r requirements.txt
            pm2 restart muse